<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Calendar — BIG P</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #0d0d0d;
    --border:    #1e1e1e;
    --border2:   #161616;
    --text:      #f0f0f0;
    --muted:     #888888;
    --dim:       #444444;
    --faint:     #333333;
    --ghost:     #222222;
    --green:     #4ade80;
    --green-dim: #3a7a4a;
    --red:       #f87171;
    --red-dim:   #7a3a3a;
    --white:     #ffffff;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
    font-size: 13px;
  }

  /* ── Layout ── */
  .wrap { max-width: 860px; margin: 0 auto; }

  h1 {
    font-size: 17px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  .top-row {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  /* ── Accounts Panel ── */
  .accounts-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    flex: 1;
    min-width: 220px;
  }

  .sec-label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .account-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }

  .account-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  .account-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .account-name { flex: 1; font-size: 12px; color: #ccc; font-weight: 500; }

  .account-total { font-size: 12px; font-weight: 600; }
  .account-total.pos { color: var(--green); }
  .account-total.neg { color: var(--red); }

  .remove-btn {
    background: none;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: var(--red); }

  .add-account-row { display: flex; gap: 6px; }

  .add-account-row input {
    flex: 1;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--ghost);
    background: var(--surface2);
    color: var(--text);
    min-width: 0;
    font-family: inherit;
  }

  .add-account-row input:focus { outline: none; border-color: var(--dim); }

  .btn-primary {
    background: var(--white);
    color: var(--bg);
    border: none;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-primary:hover { background: #e5e5e5; }

  /* ── Stats Panel ── */
  .stats-panel {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    flex: 2;
    min-width: 240px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  .stat-card-label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .stat-card-val { font-size: 20px; font-weight: 600; color: var(--white); }
  .stat-card-val.pos { color: var(--green); }
  .stat-card-val.neg { color: var(--red); }

  /* ── Entry Panel ── */
  .entry-modal {
    background: var(--surface);
    border: 1px solid #242424;
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .entry-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .entry-modal-title { font-size: 12px; font-weight: 600; color: var(--muted); }

  .close-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--white); }

  .entries-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
  }

  .entry-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }

  .entry-row-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .entry-row-acc { flex: 1; color: var(--muted); }
  .entry-row-pnl { font-weight: 600; }
  .entry-row-pnl.pos { color: var(--green); }
  .entry-row-pnl.neg { color: var(--red); }

  .entry-del {
    background: none;
    border: none;
    color: #2a2a2a;
    cursor: pointer;
    font-size: 12px;
    padding: 0 4px;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .entry-del:hover { color: var(--red); }

  .entry-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .entry-form-group { display: flex; flex-direction: column; gap: 4px; }

  .entry-form-group label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .entry-form-group input,
  .entry-form-group select {
    font-size: 12px;
    padding: 7px 9px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--ghost);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
  }

  .entry-form-group input:focus,
  .entry-form-group select:focus { outline: none; border-color: var(--dim); }

  .entry-form-group select { min-width: 130px; }

  .save-btn {
    background: var(--white);
    color: var(--bg);
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .save-btn:hover { background: #e5e5e5; }

  /* ── Calendar ── */
  .cal-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-nav span { font-size: 14px; font-weight: 500; color: var(--white); }

  .cal-nav button {
    background: none;
    border: 1px solid var(--ghost);
    color: #666;
    padding: 4px 11px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    transition: border-color 0.15s, color 0.15s;
  }
  .cal-nav button:hover { border-color: #444; color: var(--white); }

  .cal-days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }

  .cal-day-name {
    text-align: center;
    font-size: 9px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-cell {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    min-height: 80px;
    padding: 7px;
    cursor: default;
    transition: border-color 0.15s;
  }

  .cal-cell.today      { border-color: #2a2a2a; }
  .cal-cell.has-data   { cursor: pointer; }
  .cal-cell.has-data:hover { border-color: #2e2e2e; }
  .cal-cell.selected   { border-color: #3a3a3a; }
  .cal-cell.other-month .cal-cell-num { color: #1e1e1e; }

  .cal-cell-num { font-size: 10px; color: var(--faint); font-weight: 500; margin-bottom: 5px; }
  .cal-cell.today .cal-cell-num { color: var(--muted); }

  .cal-total { font-size: 12px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .cal-total.pos { color: var(--green); }
  .cal-total.neg { color: var(--red); }

  .cal-breakdown { display: flex; flex-direction: column; gap: 2px; }

  .cal-acc-line { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #555; }
  .cal-acc-dot  { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cal-acc-val  { font-weight: 500; }
  .cal-acc-val.pos { color: var(--green-dim); }
  .cal-acc-val.neg { color: var(--red-dim); }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--faint);
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ── Watermark ── */
  .watermark {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font-size: 10px;
    color: #1e1e1e;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
  }

  /* ── Charts ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  @media (max-width: 600px) {
    .charts-row { grid-template-columns: 1fr; }
  }

  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .chart-title {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 14px;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 100%;
    height: 160px;
  }

  canvas { width: 100% !important; height: 100% !important; }

  .chart-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 160px;
    font-size: 11px;
    color: var(--faint);
  }

  /* ── Helpers ── */
  .empty-msg { font-size: 12px; color: var(--faint); padding: 4px 0; }
  .all-logged { font-size: 11px; color: var(--dim); margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>P&L Calendar</h1>

  <div class="top-row">
    <div class="accounts-panel">
      <div class="sec-label">Accounts</div>
      <div class="account-list" id="account-list"></div>
      <div class="add-account-row">
        <input
          type="text"
          id="new-acc-name"
          placeholder="Account name"
          maxlength="24"
          onkeydown="if(event.key==='Enter') addAccount()"
        >
        <button class="btn-primary" onclick="addAccount()">+ Add</button>
      </div>
    </div>

    <div class="stats-panel" id="stats-panel"></div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-panel">
      <div class="chart-title">Cumulative P&L</div>
      <div class="chart-canvas-wrap">
        <div class="chart-empty" id="cumulative-empty">No data yet</div>
        <canvas id="cumulative-chart" style="display:none"></canvas>
      </div>
    </div>
    <div class="chart-panel">
      <div class="chart-title">Daily P&L — <span id="bar-month-label"></span></div>
      <div class="chart-canvas-wrap">
        <div class="chart-empty" id="bar-empty">No data this month</div>
        <canvas id="bar-chart" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <div id="entry-panel"></div>

  <div class="cal-section">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&#8592;</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-days-header" id="cal-days-header"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#4ade80"></span>Profitable day</span>
      <span><span class="legend-dot" style="background:#f87171"></span>Loss day</span>
      <span><span class="legend-dot" style="background:#333"></span>Break-even</span>
    </div>
  </div>
</div>

<div class="watermark">made &amp; designed by BIG P</div>

<script>
  // ── Constants ──
  const STORAGE_KEY = 'bigp_pnl_cal';
  const COLORS = ['#a78bfa','#60a5fa','#4ade80','#f97316','#f472b6','#facc15','#38bdf8','#c084fc'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // ── State ──
  let data = { accounts: [], entries: [] };
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let selectedDate = null;

  // Load from localStorage
  try {
    data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"accounts":[],"entries":[]}');
  } catch (e) {}

  // ── Persistence ──
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }

  // ── Helpers ──
  function getColor(idx) {
    return COLORS[idx % COLORS.length];
  }

  function fmt(val, decimals = 2) {
    return (val >= 0 ? '+' : '') + '$' + val.toFixed(decimals);
  }

  function getAccountPnl(accId) {
    return data.entries
      .filter(e => e.accountId === accId)
      .reduce((sum, e) => sum + e.pnl, 0);
  }

  function getDayTotal(dateStr) {
    return data.entries
      .filter(e => e.date === dateStr)
      .reduce((sum, e) => sum + e.pnl, 0);
  }

  // ── Account Actions ──
  function addAccount() {
    const input = document.getElementById('new-acc-name');
    const name = input.value.trim();
    if (!name) return;
    const duplicate = data.accounts.some(a => a.name.toLowerCase() === name.toLowerCase());
    if (duplicate) { input.value = ''; return; }
    data.accounts.push({ id: Date.now(), name });
    input.value = '';
    save();
    render();
  }

  function removeAccount(id) {
    data.accounts = data.accounts.filter(a => a.id !== id);
    data.entries  = data.entries.filter(e => e.accountId !== id);
    save();
    render();
  }

  // ── Entry Actions ──
  function addEntry() {
    const dateVal = document.getElementById('entry-date').value;
    const accId   = parseInt(document.getElementById('entry-acc').value);
    const pnl     = parseFloat(document.getElementById('entry-pnl').value);
    if (!dateVal || !accId || isNaN(pnl)) return;

    const existing = data.entries.find(e => e.date === dateVal && e.accountId === accId);
    if (existing) {
      existing.pnl = pnl;
    } else {
      data.entries.push({ id: Date.now(), date: dateVal, accountId: accId, pnl });
    }
    save();
    render();
  }

  function removeEntry(id) {
    data.entries = data.entries.filter(e => e.id !== id);
    save();
    render();
  }

  // ── Calendar Navigation ──
  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderCalendar();
  }

  function openDay(dateStr) {
    selectedDate = dateStr;
    render();
    setTimeout(() => {
      document.getElementById('entry-panel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function closeEntry() {
    selectedDate = null;
    render();
  }

  // ── Renderers ──
  function renderAccounts() {
    const el = document.getElementById('account-list');

    if (!data.accounts.length) {
      el.innerHTML = '<div class="empty-msg">No accounts yet</div>';
      return;
    }

    el.innerHTML = data.accounts.map((account, i) => {
      const total = getAccountPnl(account.id);
      const cls   = total >= 0 ? 'pos' : 'neg';
      return `
        <div class="account-item">
          <div class="account-dot" style="background:${getColor(i)}"></div>
          <div class="account-name">${account.name}</div>
          <div class="account-total ${cls}">${fmt(total)}</div>
          <button class="remove-btn" onclick="removeAccount(${account.id})">✕</button>
        </div>`;
    }).join('');
  }

  function renderStats() {
    const totalPnl  = data.entries.reduce((s, e) => s + e.pnl, 0);
    const allDays   = [...new Set(data.entries.map(e => e.date))];
    const dayTotals = allDays.map(d => getDayTotal(d));
    const profDays  = dayTotals.filter(v => v > 0).length;
    const lossDays  = dayTotals.filter(v => v < 0).length;
    const winRate   = allDays.length > 0 ? Math.round(profDays / allDays.length * 100) : 0;
    const cls       = totalPnl >= 0 ? 'pos' : 'neg';

    document.getElementById('stats-panel').innerHTML = `
      <div class="stat-card">
        <div class="stat-card-label">Total P&L</div>
        <div class="stat-card-val ${cls}">${fmt(totalPnl)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Profit days</div>
        <div class="stat-card-val pos">${profDays}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Loss days</div>
        <div class="stat-card-val neg">${lossDays}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Win rate</div>
        <div class="stat-card-val">${winRate}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Accounts</div>
        <div class="stat-card-val">${data.accounts.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Days tracked</div>
        <div class="stat-card-val">${allDays.length}</div>
      </div>`;
  }

  function renderEntryPanel() {
    const el = document.getElementById('entry-panel');
    if (!selectedDate || !data.accounts.length) { el.innerHTML = ''; return; }

    const dayEntries       = data.entries.filter(e => e.date === selectedDate);
    const loggedIds        = new Set(dayEntries.map(e => e.accountId));
    const availableAccounts = data.accounts.filter(a => !loggedIds.has(a.id));

    const entriesHtml = dayEntries.length
      ? `<div class="entries-list">${dayEntries.map(e => {
          const acc = data.accounts.find(a => a.id === e.accountId);
          const idx = data.accounts.indexOf(acc);
          const cls = e.pnl >= 0 ? 'pos' : 'neg';
          return `
            <div class="entry-row">
              <div class="entry-row-dot" style="background:${getColor(idx)}"></div>
              <div class="entry-row-acc">${acc ? acc.name : 'Unknown'}</div>
              <div class="entry-row-pnl ${cls}">${fmt(e.pnl)}</div>
              <button class="entry-del" onclick="removeEntry(${e.id})">✕</button>
            </div>`;
        }).join('')}</div>`
      : '';

    const addFormHtml = availableAccounts.length
      ? `<div class="entry-form">
          <div class="entry-form-group">
            <label>Account</label>
            <select id="entry-acc">
              ${availableAccounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}
            </select>
          </div>
          <div class="entry-form-group">
            <label>P&L ($)</label>
            <input type="number" id="entry-pnl" placeholder="e.g. 420" style="width:110px">
          </div>
          <input type="hidden" id="entry-date" value="${selectedDate}">
          <button class="save-btn" onclick="addEntry()">Save</button>
        </div>`
      : '<div class="all-logged">All accounts logged for this day</div>';

    el.innerHTML = `
      <div class="entry-modal">
        <div class="entry-modal-header">
          <div class="entry-modal-title">${selectedDate}</div>
          <button class="close-btn" onclick="closeEntry()">✕</button>
        </div>
        ${entriesHtml}
        ${addFormHtml}
      </div>`;
  }

  function renderCalendar() {
    document.getElementById('month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
    document.getElementById('cal-days-header').innerHTML =
      DAY_NAMES.map(d => `<div class="cal-day-name">${d}</div>`).join('');

    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const firstDay    = new Date(calYear, calMonth, 1).getDay();
    const prevDays    = new Date(calYear, calMonth, 0).getDate();
    const today       = new Date().toISOString().split('T')[0];

    // Group entries by date
    const byDate = {};
    data.entries.forEach(e => {
      if (!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    });

    let cells = '';

    // Trailing days from previous month
    for (let i = 0; i < firstDay; i++) {
      const day = prevDays - firstDay + i + 1;
      cells += `<div class="cal-cell other-month"><div class="cal-cell-num">${day}</div></div>`;
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const ds      = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entries = byDate[ds] || [];
      const total   = entries.reduce((s, e) => s + e.pnl, 0);
      const isToday = ds === today;
      const isSel   = ds === selectedDate;

      const classes = [
        'cal-cell',
        isToday           ? 'today'    : '',
        entries.length    ? 'has-data' : '',
        isSel             ? 'selected' : '',
      ].filter(Boolean).join(' ');

      let inner = `<div class="cal-cell-num">${d}</div>`;

      if (entries.length) {
        const pc = total > 0 ? 'pos' : total < 0 ? 'neg' : '';
        inner += `<div class="cal-total ${pc}">${fmt(total, 0)}</div>`;
        inner += `<div class="cal-breakdown">
          ${entries.slice(0, 3).map(e => {
            const acc = data.accounts.find(a => a.id === e.accountId);
            const idx = data.accounts.indexOf(acc);
            const vpc = e.pnl >= 0 ? 'pos' : 'neg';
            return `<div class="cal-acc-line">
              <span class="cal-acc-dot" style="background:${getColor(idx)}"></span>
              <span class="cal-acc-val ${vpc}">${fmt(e.pnl, 0)}</span>
            </div>`;
          }).join('')}
          ${entries.length > 3 ? `<div style="font-size:9px;color:#333">+${entries.length - 3} more</div>` : ''}
        </div>`;
      }

      cells += `<div class="${classes}" onclick="openDay('${ds}')">${inner}</div>`;
    }

    // Leading days from next month
    const remaining = (7 - (firstDay + daysInMonth) % 7) % 7;
    for (let i = 1; i <= remaining; i++) {
      cells += `<div class="cal-cell other-month"><div class="cal-cell-num">${i}</div></div>`;
    }

    document.getElementById('cal-grid').innerHTML = cells;
  }

  // ── Charts ──
  let cumulativeChart = null;
  let barChart = null;

  function renderCharts() {
    renderCumulativeChart();
    renderBarChart();
  }

  function renderCumulativeChart() {
    const canvas  = document.getElementById('cumulative-chart');
    const empty   = document.getElementById('cumulative-empty');

    // Build sorted daily totals across all time
    const dateMap = {};
    data.entries.forEach(e => {
      dateMap[e.date] = (dateMap[e.date] || 0) + e.pnl;
    });
    const sorted = Object.keys(dateMap).sort();

    if (!sorted.length) {
      canvas.style.display = 'none';
      empty.style.display  = 'flex';
      if (cumulativeChart) { cumulativeChart.destroy(); cumulativeChart = null; }
      return;
    }

    canvas.style.display = 'block';
    empty.style.display  = 'none';

    let running = 0;
    const labels = sorted.map(d => d.slice(5)); // MM-DD
    const values = sorted.map(d => { running += dateMap[d]; return parseFloat(running.toFixed(2)); });
    const lastVal = values[values.length - 1];
    const lineColor = lastVal >= 0 ? '#4ade80' : '#f87171';

    if (cumulativeChart) cumulativeChart.destroy();

    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 160);
    grad.addColorStop(0, lastVal >= 0 ? 'rgba(74,222,128,0.18)' : 'rgba(248,113,113,0.18)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    cumulativeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: lineColor,
          borderWidth: 2,
          backgroundColor: grad,
          pointRadius: values.length > 20 ? 0 : 3,
          pointBackgroundColor: lineColor,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => (ctx.parsed.y >= 0 ? '+' : '') + '$' + ctx.parsed.y.toFixed(2) }
        }},
        scales: {
          x: { ticks: { color: '#444', font: { size: 9 }, maxTicksLimit: 6 }, grid: { color: '#161616' } },
          y: { ticks: { color: '#444', font: { size: 9 }, callback: v => '$' + v }, grid: { color: '#161616' } }
        }
      }
    });
  }

  function renderBarChart() {
    const canvas = document.getElementById('bar-chart');
    const empty  = document.getElementById('bar-empty');
    document.getElementById('bar-month-label').textContent = MONTH_NAMES[calMonth] + ' ' + calYear;

    const prefix = `${calYear}-${String(calMonth + 1).padStart(2,'0')}`;
    const monthEntries = data.entries.filter(e => e.date.startsWith(prefix));

    const dateMap = {};
    monthEntries.forEach(e => { dateMap[e.date] = (dateMap[e.date] || 0) + e.pnl; });
    const sorted = Object.keys(dateMap).sort();

    if (!sorted.length) {
      canvas.style.display = 'none';
      empty.style.display  = 'flex';
      if (barChart) { barChart.destroy(); barChart = null; }
      return;
    }

    canvas.style.display = 'block';
    empty.style.display  = 'none';

    const labels = sorted.map(d => parseInt(d.split('-')[2]));
    const values = sorted.map(d => parseFloat(dateMap[d].toFixed(2)));
    const colors = values.map(v => v >= 0 ? 'rgba(74,222,128,0.7)' : 'rgba(248,113,113,0.7)');
    const borders = values.map(v => v >= 0 ? '#4ade80' : '#f87171');

    if (barChart) barChart.destroy();

    barChart = new Chart(document.getElementById('bar-chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderColor: borders,
          borderWidth: 1,
          borderRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => (ctx.parsed.y >= 0 ? '+' : '') + '$' + ctx.parsed.y.toFixed(2) }
        }},
        scales: {
          x: { ticks: { color: '#444', font: { size: 9 } }, grid: { color: '#161616' } },
          y: { ticks: { color: '#444', font: { size: 9 }, callback: v => '$' + v }, grid: { color: '#161616' } }
        }
      }
    });
  }

  // ── Main Render ──
  function render() {
    renderAccounts();
    renderStats();
    renderCharts();
    renderEntryPanel();
    renderCalendar();
  }

  render();
</script>
</body>
</html>
